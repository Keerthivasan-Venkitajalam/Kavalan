services:
  # PostgreSQL for structured data
  postgres:
    image: postgres:16-alpine
    container_name: kavalan-postgres
    environment:
      POSTGRES_DB: kavalan
      POSTGRES_USER: kavalan_user
      POSTGRES_PASSWORD: kavalan_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/backend/db/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavalan_user -d kavalan"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB for unstructured data
  mongodb:
    image: mongo:7.0
    container_name: kavalan-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: kavalan_user
      MONGO_INITDB_ROOT_PASSWORD: kavalan_dev_password
      MONGO_INITDB_DATABASE: kavalan
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./packages/backend/db/init-mongodb.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for message queue
  redis:
    image: redis:7-alpine
    container_name: kavalan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (multiple instances for load balancing)
  backend-1:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: kavalan-backend-1
    environment:
      - DATABASE_URL=postgresql://kavalan_user:kavalan_dev_password@postgres:5432/kavalan
      - MONGODB_URL=mongodb://kavalan_user:kavalan_dev_password@mongodb:27017/kavalan
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=dev_secret_key_change_in_production
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  backend-2:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: kavalan-backend-2
    environment:
      - DATABASE_URL=postgresql://kavalan_user:kavalan_dev_password@postgres:5432/kavalan
      - MONGODB_URL=mongodb://kavalan_user:kavalan_dev_password@mongodb:27017/kavalan
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=dev_secret_key_change_in_production
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  backend-3:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: kavalan-backend-3
    environment:
      - DATABASE_URL=postgresql://kavalan_user:kavalan_dev_password@postgres:5432/kavalan
      - MONGODB_URL=mongodb://kavalan_user:kavalan_dev_password@mongodb:27017/kavalan
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=dev_secret_key_change_in_production
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # NGINX API Gateway
  nginx:
    build:
      context: ./packages/backend/nginx
      dockerfile: Dockerfile
    container_name: kavalan-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    volumes:
      - ./packages/backend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf

  # Celery Worker - Audio Queue
  celery-worker-audio:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: kavalan-celery-worker-audio
    environment:
      - DATABASE_URL=postgresql://kavalan_user:kavalan_dev_password@postgres:5432/kavalan
      - MONGODB_URL=mongodb://kavalan_user:kavalan_dev_password@mongodb:27017/kavalan
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=dev_secret_key_change_in_production
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/backend:/app
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q audio_queue -n audio_worker@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d audio_worker@$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker - Visual Queue
  celery-worker-visual:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: kavalan-celery-worker-visual
    environment:
      - DATABASE_URL=postgresql://kavalan_user:kavalan_dev_password@postgres:5432/kavalan
      - MONGODB_URL=mongodb://kavalan_user:kavalan_dev_password@mongodb:27017/kavalan
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=dev_secret_key_change_in_production
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/backend:/app
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q visual_queue -n visual_worker@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d visual_worker@$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker - Liveness Queue
  celery-worker-liveness:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: kavalan-celery-worker-liveness
    environment:
      - DATABASE_URL=postgresql://kavalan_user:kavalan_dev_password@postgres:5432/kavalan
      - MONGODB_URL=mongodb://kavalan_user:kavalan_dev_password@mongodb:27017/kavalan
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=dev_secret_key_change_in_production
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/backend:/app
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q liveness_queue -n liveness_worker@%h
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d liveness_worker@$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
